    <style>
      :root {
        /* dark (default) */
        --c-ink: 0 0 0;
        --c-panel: 7 7 7;
        --c-line: 24 24 24;
        --c-line2: 38 38 38;
        --c-fg: 237 237 237;
        --c-dim: 122 122 122;
        --c-dimmer: 74 74 74;
        --c-lav: 203 166 247;
        --c-vb: 0 112 243;
        --grid-line: rgba(255, 255, 255, 0.025);
        --shimmer-mask: #000;
      }
      :root[data-theme="light"] {
        --c-ink: 255 255 255;
        --c-panel: 250 250 250;
        --c-line: 230 230 230;
        --c-line2: 210 210 210;
        --c-fg: 10 10 10;
        --c-dim: 110 110 110;
        --c-dimmer: 160 160 160;
        --c-lav: 124 58 237;
        --c-vb: 0 92 219;
        --grid-line: rgba(0, 0, 0, 0.04);
        --shimmer-mask: #fff;
      }
      html,
      body {
        background: rgb(var(--c-ink));
        color: rgb(var(--c-fg));
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      .font-display {
        font-family: "Space Grotesk", system-ui, sans-serif;
        letter-spacing: -0.02em;
      }
      .font-mono {
        font-family: "Geist Mono", ui-monospace, monospace;
      }

      /* Background grid */
      .bg-grid {
        background-image:
          linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          #000 30%,
          transparent 80%
        );
      }

      /* Card shimmer (Vercel-style) */
      .shimmer {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .shimmer::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        padding: 1px;
        background: conic-gradient(
          from var(--shimmer-angle, 0deg),
          transparent 0%,
          transparent 70%,
          rgba(203, 166, 247, 0.55) 80%,
          rgba(0, 112, 243, 0.55) 90%,
          transparent 100%
        );
        -webkit-mask:
          linear-gradient(var(--shimmer-mask) 0 0) content-box,
          linear-gradient(var(--shimmer-mask) 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.35s ease;
        pointer-events: none;
        z-index: 0;
      }
      .shimmer:hover::before {
        opacity: 1;
        animation: spin 2.4s linear infinite;
      }
      @keyframes spin {
        to {
          --shimmer-angle: 360deg;
        }
      }
      @property --shimmer-angle {
        syntax: "<angle>";
        inherits: false;
        initial-value: 0deg;
      }

      /* Live-preview animated motif backgrounds — purely cosmetic */
      .preview-base {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .preview-on .preview-base {
        opacity: 1;
      }

      .preview-dots {
        background-image: radial-gradient(
          rgba(203, 166, 247, 0.55) 1px,
          transparent 1.4px
        );
        background-size: 10px 10px;
        animation: drift 6s linear infinite;
      }
      @keyframes drift {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 40px 40px;
        }
      }

      .preview-rings {
        background: radial-gradient(
          circle at 50% 50%,
          transparent 0 22%,
          rgba(0, 112, 243, 0.35) 22.5% 23%,
          transparent 23.5% 32%,
          rgba(203, 166, 247, 0.4) 32.5% 33%,
          transparent 33.5% 46%,
          rgba(0, 112, 243, 0.25) 46.5% 47%,
          transparent 47.5%
        );
        animation: pulse 2.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
      }

      .preview-bars {
        background: repeating-linear-gradient(
          90deg,
          transparent 0 6px,
          rgba(203, 166, 247, 0.5) 6px 8px,
          transparent 8px 14px
        );
        animation: bars 1.2s steps(8) infinite;
      }
      @keyframes bars {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 56px 0;
        }
      }

      .preview-particles {
        background:
          radial-gradient(
            2px 2px at 20% 30%,
            rgba(203, 166, 247, 0.9),
            transparent 60%
          ),
          radial-gradient(
            1.5px 1.5px at 80% 20%,
            rgba(0, 112, 243, 0.9),
            transparent 60%
          ),
          radial-gradient(
            2px 2px at 60% 70%,
            rgba(203, 166, 247, 0.7),
            transparent 60%
          ),
          radial-gradient(
            1.5px 1.5px at 30% 80%,
            rgba(0, 112, 243, 0.7),
            transparent 60%
          ),
          radial-gradient(
            1.5px 1.5px at 90% 60%,
            rgba(203, 166, 247, 0.6),
            transparent 60%
          );
        animation: float 4s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      .preview-flow {
        background:
          repeating-linear-gradient(
            45deg,
            transparent 0 8px,
            rgba(203, 166, 247, 0.35) 8px 9px,
            transparent 9px 18px
          ),
          repeating-linear-gradient(
            -45deg,
            transparent 0 12px,
            rgba(0, 112, 243, 0.25) 12px 13px,
            transparent 13px 26px
          );
        animation: drift 8s linear infinite;
      }

      /* DIIA-style chunky number markers */
      .num-tab {
        font-family: "Geist Mono", ui-monospace, monospace;
        font-feature-settings: "tnum" 1;
      }

      /* Sticky bar blur */
      .sticky-blur {
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        background-color: rgb(var(--c-ink) / 0.72);
      }

      /* Custom scrollbar (subtle) */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--c-ink));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--c-line2));
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--c-dimmer));
      }

      /* Focus state — DIIA heavy border */
      a.card-link:focus-visible {
        outline: none;
        border-color: rgb(var(--c-lav));
        box-shadow: 0 0 0 1px rgb(var(--c-lav)) inset;
      }

      /* Bold underline accents under section headings */
      .heading-rule {
        height: 4px;
        background: rgb(var(--c-lav));
        width: 56px;
      }

      /* Marquee for ticker */
      .ticker {
        display: flex;
        gap: 48px;
        white-space: nowrap;
        animation: tick 60s linear infinite;
      }
      @keyframes tick {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }
    </style>

        if (t.includes("mesh") || t.includes("particles"))

      function App() {
        const [query, setQuery] = useState("");
        const [cat, setCat] = useState("All");
        const [livePreview, setLivePreview] = useState(false);
        const [view, setView] = useState("grid");
        const [theme, setTheme] = useState(() => {
          if (typeof window === "undefined") return "dark";
          const saved = localStorage.getItem("obsefx-theme");
          if (saved === "light" || saved === "dark") return saved;
          return "dark";
        });

        useEffect(() => {
          document.documentElement.setAttribute("data-theme", theme);
          try {
            localStorage.setItem("obsefx-theme", theme);
          } catch {}
        }, [theme]);

        const counts = useMemo(() => {
          const c = { All: ITEMS.length };
          for (const k of CATS.slice(1))
            c[k] = ITEMS.filter((x) => x.cat === k).length;
          return c;
        }, []);

        const filtered = useMemo(() => {
          const q = query.trim().toLowerCase();
          return ITEMS.filter((it) => {
            if (cat !== "All" && it.cat !== cat) return false;
            if (!q) return true;
            const hay = (
              it.label +
              " " +
              it.cat +
              " " +
              it.tags.join(" ")
            ).toLowerCase();
            return hay.includes(q);
          });
        }, [query, cat]);

        /* group by category for the grid view (when All is selected) */
        const grouped = useMemo(() => {
          if (cat !== "All" || query.trim()) return null;
          const g = {};
          for (const k of CATS.slice(1))
            g[k] = filtered.filter((x) => x.cat === k);
          return g;
        }, [filtered, cat, query]);

        /* ⌘K focus */
        const inputRef = useRef(null);
        useEffect(() => {
          const handler = (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
              e.preventDefault();
              const el = document.querySelector('input[placeholder^="Search"]');
              el?.focus();
            }
          };
          window.addEventListener("keydown", handler);
          return () => window.removeEventListener("keydown", handler);
        }, []);

        return (
          <div className="min-h-screen">
            {/* Top nav */}
            <nav className="border-b border-line">
              <div className="max-w-[1400px] mx-auto px-6 md:px-10 h-14 flex items-center justify-between">
                <Logo />
                <div className="hidden md:flex items-center gap-7 font-mono text-[11px] uppercase tracking-wider text-dim">
                  <a href="#" className="hover:text-fg transition-colors">
                    Catalog
                  </a>
                  <a href="#" className="hover:text-fg transition-colors">
                    Docs
                  </a>
                  <a href="#" className="hover:text-fg transition-colors">
                    Changelog
                  </a>
                  <a href="#" className="hover:text-fg transition-colors">
                    GitHub ↗
                  </a>
                </div>
                <div className="flex items-center gap-2">
                  <div className="hidden sm:flex items-center gap-2 font-mono text-[10px] uppercase tracking-wider text-dim border border-line px-2.5 h-8">
                    <span
                      className="w-1.5 h-1.5 bg-emerald-400 rounded-full"
                      style={{ boxShadow: "0 0 8px rgba(52,211,153,0.6)" }}
                    ></span>
                    All systems normal
                  </div>
                  <ThemeToggle theme={theme} setTheme={setTheme} />
                  <a
                    href="#catalog"
                    className="h-8 px-3 inline-flex items-center gap-2 bg-fg text-ink font-mono text-[11px] uppercase tracking-wider hover:bg-lav transition-colors"
                  >
                    Deploy
                    <span>→</span>
                  </a>
                </div>
              </div>
            </nav>

            <Hero
              total={ITEMS.length}
              livePreview={livePreview}
              setLivePreview={setLivePreview}
            />

            <FilterBar
              query={query}
              setQuery={setQuery}
              cat={cat}
              setCat={setCat}
              counts={counts}
              livePreview={livePreview}
              setLivePreview={setLivePreview}
              view={view}
              setView={setView}
            />

            {/* Main */}
            <main
              id="catalog"
              className="max-w-[1400px] mx-auto px-6 md:px-10 py-12"
            >
              {grouped ? (
                <div className="space-y-16">
                  {CATS.slice(1).map((c, i) => (
                    <section
                      key={c}
                      data-screen-label={`${String(i + 1).padStart(2, "0")} ${c}`}
                    >
                      <SectionHeader
                        num={`§ ${String(i + 1).padStart(2, "0")}`}
                        title={c}
                        count={grouped[c].length}
                      />
                      {view === "grid" ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                          {grouped[c].map((it, idx) => (
                            <Card
                              key={it.href}
                              item={it}
                              idx={idx}
                              livePreview={livePreview}
                            />
                          ))}
                        </div>
                      ) : (
                        <div className="border-t border-line">
                          {grouped[c].map((it, idx) => (
                            <ListRow
                              key={it.href}
                              item={it}
                              idx={idx}
                              livePreview={livePreview}
                            />
                          ))}
                        </div>
                      )}
                    </section>
                  ))}
                </div>
              ) : (
                <section>
                  <SectionHeader
                    num="§ 00"
                    title={query.trim() ? `Results for "${query}"` : cat}
                    count={filtered.length}
                  />
                  {filtered.length === 0 ? (
                    <div className="border border-line p-12 text-center">
                      <div className="font-display font-bold text-[22px]">
                        No effects found
                      </div>
                      <div className="mt-2 font-mono text-[12px] uppercase tracking-wider text-dim">
                        try a different query or category
                      </div>
                    </div>
                  ) : view === "grid" ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                      {filtered.map((it, idx) => (
                        <Card
                          key={it.href}
                          item={it}
                          idx={idx}
                          livePreview={livePreview}
                        />
                      ))}
                    </div>
                  ) : (
                    <div className="border-t border-line">
                      {filtered.map((it, idx) => (
                        <ListRow
                          key={it.href}
                          item={it}
                          idx={idx}
                          livePreview={livePreview}
                        />
                      ))}
                    </div>
                  )}
                </section>
              )}
            </main>

            {/* Footer */}
            <footer className="border-t border-line">
              <div className="max-w-[1400px] mx-auto px-6 md:px-10 py-10 grid grid-cols-1 md:grid-cols-12 gap-8">
                <div className="md:col-span-5">
                  <Logo />
                  <p className="mt-4 text-dim text-[13px] max-w-md">
                    A directory of GPU-accelerated browser-source effects for
                    streamers. Drop any URL into OBS as a Browser Source —
                    transparency is preserved.
                  </p>
                </div>
                <div className="md:col-span-7 grid grid-cols-3 gap-6">
                  {[
                    [
                      "Catalog",
                      [
                        "All Effects",
                        "Webcam Borders",
                        "Backgrounds",
                        "Audio Visualizers",
                      ],
                    ],
                    [
                      "Resources",
                      ["Docs", "Setup Guide", "Performance", "Changelog"],
                    ],
                    ["About", ["GitHub", "License", "Contact", "Status"]],
                  ].map(([h, items]) => (
                    <div key={h}>
                      <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-dim mb-3">
                        {h}
                      </div>
                      <ul className="space-y-2">
                        {items.map((i) => (
                          <li key={i}>
                            <a
                              href="#"
                              className="text-[13px] text-fg/80 hover:text-lav transition-colors"
                            >
                              {i}
                            </a>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
              <div className="border-t border-line">
                <div className="max-w-[1400px] mx-auto px-6 md:px-10 h-12 flex items-center justify-between font-mono text-[10px] uppercase tracking-wider text-dim">
                  <div>© 2026 OBS/EFX · MIT</div>
                  <div className="flex items-center gap-4">
                    <span>Build 2026.05.06</span>
                    <span className="text-lav">●</span>
                    <span>Operational</span>
                  </div>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
